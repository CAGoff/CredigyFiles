name: CD — Deploy All (Manual)

on:
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ── Parallel build jobs ──────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: >
          dotnet publish src/api/SecureFileTransfer.Api/SecureFileTransfer.Api.csproj
          --configuration Release
          --output ./publish/api

      - name: Zip package
        run: cd publish/api && zip -r ../../api-package.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: api-package.zip

  build-functions:
    name: Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: >
          dotnet publish src/functions/SecureFileTransfer.Functions/SecureFileTransfer.Functions.csproj
          --configuration Release
          --output ./publish/functions

      - name: Zip package
        run: cd publish/functions && zip -r ../../functions-package.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-package
          path: functions-package.zip

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AAD_CLIENT_ID: ${{ vars.VITE_AAD_CLIENT_ID }}
          VITE_AAD_TENANT_ID: ${{ vars.VITE_AAD_TENANT_ID }}
          VITE_AAD_API_CLIENT_ID: ${{ vars.VITE_AAD_API_CLIENT_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/web/dist

  # ── Sequential deploy job ────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: [build-api, build-functions, build-web]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # 1. Deploy API & SPA — upload packages to blob storage (Run From Package)
      #    Temporarily enable public access on app storage for upload.
      - name: Enable app storage public access
        run: |
          az storage account update \
            --name sftcredigyfilesdevapp \
            --resource-group rg-credigyfiles-dev-eus \
            --public-network-access Enabled \
            --default-action Allow

      - name: Upload API package
        run: |
          az storage blob upload \
            --account-name sftcredigyfilesdevapp \
            --container-name deploy-api \
            --name package.zip \
            --file artifacts/api-package/api-package.zip \
            --overwrite \
            --auth-mode login

      # 2. Deploy Functions (Flex Consumption)
      #    Workaround: Flex Consumption + VNet = Kudu can't reach blob storage.
      #    Temporarily remove VNet integration, deploy, then re-add it.
      - name: Enable Functions storage public access
        run: |
          az storage account update \
            --name sftcredigyfilesdevfunc \
            --resource-group rg-credigyfiles-dev-eus \
            --public-network-access Enabled \
            --default-action Allow

      - name: Remove Function App VNet integration
        run: |
          az functionapp vnet-integration remove \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func || true
          echo "Waiting 60s for VNet removal to propagate..."
          sleep 60

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: sft-credigyfiles-dev-func
          package: artifacts/functions-package/functions-package.zip

      - name: Restore Function App VNet integration
        if: always()
        run: |
          VNET_ID="/subscriptions/$(az account show --query id -o tsv)/resourceGroups/rg-network-dev-eus/providers/Microsoft.Network/virtualNetworks/vnet-webapp-dev-eus"
          az functionapp vnet-integration add \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func \
            --vnet "$VNET_ID" \
            --subnet sn-credigyfiles-func-outbound-dev-172_23_17_208-28

      - name: Disable Functions storage public access
        if: always()
        run: |
          az storage account update \
            --name sftcredigyfilesdevfunc \
            --resource-group rg-credigyfiles-dev-eus \
            --default-action Deny \
            --public-network-access Disabled

      # 3. Deploy SPA — upload package to blob storage (Run From Package)
      - name: Zip SPA
        run: cd artifacts/web-dist && zip -r ../../web-package.zip .

      - name: Upload SPA package
        run: |
          az storage blob upload \
            --account-name sftcredigyfilesdevapp \
            --container-name deploy-spa \
            --name package.zip \
            --file web-package.zip \
            --overwrite \
            --auth-mode login

      - name: Disable app storage public access
        if: always()
        run: |
          az storage account update \
            --name sftcredigyfilesdevapp \
            --resource-group rg-credigyfiles-dev-eus \
            --default-action Deny \
            --public-network-access Disabled

      # 4. Restart API and SPA to pick up new packages
      - name: Restart App Services
        run: |
          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api
          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa

      # 5. Re-sync Event Grid subscription
      - name: Update Event Grid subscription
        continue-on-error: true
        run: |
          FUNC_ID=$(az functionapp show \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func \
            --query id --output tsv)

          az eventgrid system-topic event-subscription create \
            --resource-group rg-credigyfiles-dev-eus \
            --system-topic-name sft-credigyfiles-dev-evgt \
            --name sft-credigyfiles-dev-evgs-notify \
            --endpoint-type azurefunction \
            --endpoint "$FUNC_ID/functions/NotificationTrigger" \
            --included-event-types Microsoft.Storage.BlobCreated Microsoft.Storage.BlobDeleted \
            --max-delivery-attempts 30 \
            --event-ttl 1440
