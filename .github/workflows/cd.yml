name: CD — Deploy All (Manual)

on:
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ── Parallel build jobs ──────────────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    environment: dev
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      IMAGE_NAME: sft-api
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          docker build \
            -f src/api/Dockerfile \
            -t "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${ACR_SERVER}/${IMAGE_NAME}:latest" \
            .

          docker push "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${ACR_SERVER}/${IMAGE_NAME}:latest"

  build-functions:
    name: Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: >
          dotnet publish src/functions/SecureFileTransfer.Functions/SecureFileTransfer.Functions.csproj
          --configuration Release
          --output ./publish/functions

      - name: Zip package
        run: cd publish/functions && zip -r ../../functions-package.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-package
          path: functions-package.zip

  build-web:
    name: Build SPA Image
    runs-on: ubuntu-latest
    environment: dev
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      IMAGE_NAME: sft-spa
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          docker build \
            -f src/web/Dockerfile \
            --build-arg VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }} \
            --build-arg VITE_AAD_CLIENT_ID=${{ vars.VITE_AAD_CLIENT_ID }} \
            --build-arg VITE_AAD_TENANT_ID=${{ vars.VITE_AAD_TENANT_ID }} \
            --build-arg VITE_AAD_API_CLIENT_ID=${{ vars.VITE_AAD_API_CLIENT_ID }} \
            -t "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${ACR_SERVER}/${IMAGE_NAME}:latest" \
            src/web

          docker push "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${ACR_SERVER}/${IMAGE_NAME}:latest"

  # ── Sequential deploy job ────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: [build-api, build-functions, build-web]
    runs-on: ubuntu-latest
    environment: dev
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # 1. Deploy API container
      - name: Deploy API container
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          az webapp config container set \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api \
            --container-image-name "${ACR_SERVER}/sft-api:${IMAGE_TAG}"

      # 2. Deploy Functions (Flex Consumption)
      #    Workaround: Flex Consumption + VNet = Kudu can't reach blob storage.
      #    Temporarily remove VNet integration, deploy, then re-add it.
      - name: Enable Functions storage public access
        run: |
          az storage account update \
            --name sftcredigyfilesdevfunc \
            --resource-group rg-credigyfiles-dev-eus \
            --public-network-access Enabled \
            --default-action Allow

      - name: Remove Function App VNet integration
        run: |
          az functionapp vnet-integration remove \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func || true
          echo "Waiting 60s for VNet removal to propagate..."
          sleep 60

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: sft-credigyfiles-dev-func
          package: artifacts/functions-package/functions-package.zip

      - name: Restore Function App VNet integration
        if: always()
        run: |
          VNET_ID="/subscriptions/$(az account show --query id -o tsv)/resourceGroups/rg-network-dev-eus/providers/Microsoft.Network/virtualNetworks/vnet-webapp-dev-eus"
          az functionapp vnet-integration add \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func \
            --vnet "$VNET_ID" \
            --subnet sn-credigyfiles-func-outbound-dev-172_23_17_208-28

      - name: Disable Functions storage public access
        if: always()
        run: |
          az storage account update \
            --name sftcredigyfilesdevfunc \
            --resource-group rg-credigyfiles-dev-eus \
            --default-action Deny \
            --public-network-access Disabled

      # 3. Deploy SPA container
      - name: Deploy SPA container
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          az webapp config container set \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa \
            --container-image-name "${ACR_SERVER}/sft-spa:${IMAGE_TAG}"

      # 4. Restart API and SPA to pick up new containers
      - name: Restart App Services
        run: |
          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api
          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa

      # 5. Re-sync Event Grid subscription
      - name: Update Event Grid subscription
        continue-on-error: true
        run: |
          FUNC_ID=$(az functionapp show \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func \
            --query id --output tsv)

          az eventgrid system-topic event-subscription create \
            --resource-group rg-credigyfiles-dev-eus \
            --system-topic-name sft-credigyfiles-dev-evgt \
            --name sft-credigyfiles-dev-evgs-notify \
            --endpoint-type azurefunction \
            --endpoint "$FUNC_ID/functions/NotificationTrigger" \
            --included-event-types Microsoft.Storage.BlobCreated Microsoft.Storage.BlobDeleted \
            --max-delivery-attempts 30 \
            --event-ttl 1440
