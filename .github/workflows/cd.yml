name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ── Parallel build jobs ──────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: >
          dotnet publish src/api/SecureFileTransfer.Api/SecureFileTransfer.Api.csproj
          --configuration Release
          --output ./publish/api

      - name: Zip package
        run: cd publish/api && zip -r ../../api-package.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: api-package.zip

  build-functions:
    name: Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: >
          dotnet publish src/functions/SecureFileTransfer.Functions/SecureFileTransfer.Functions.csproj
          --configuration Release
          --output ./publish/functions

      - name: Zip package
        run: cd publish/functions && zip -r ../../functions-package.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-package
          path: functions-package.zip

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AAD_CLIENT_ID: ${{ vars.VITE_AAD_CLIENT_ID }}
          VITE_AAD_TENANT_ID: ${{ vars.VITE_AAD_TENANT_ID }}
          VITE_AAD_API_CLIENT_ID: ${{ vars.VITE_AAD_API_CLIENT_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/web/dist

  # ── Sequential deploy job ────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: [build-api, build-functions, build-web]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # 0. Open public access for deployment
      - name: Enable public access
        run: |
          az webapp update \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api \
            --set publicNetworkAccess=Enabled
          az webapp update \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa \
            --set publicNetworkAccess=Enabled
          az storage account update \
            --name sftcredigyfilesdevfunc \
            --resource-group rg-credigyfiles-dev-eus \
            --public-network-access Enabled \
            --default-action Allow
          echo "Waiting 60s for access changes to propagate..."
          sleep 60

      # 1. Deploy API via Kudu zipdeploy (with retry for SCM warmup)
      - name: Deploy API
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            az webapp deploy \
              --resource-group rg-credigyfiles-dev-eus \
              --name sft-credigyfiles-dev-api \
              --src-path artifacts/api-package/api-package.zip \
              --type zip \
              --clean true && break
            echo "Attempt $attempt failed, waiting 30s before retry..."
            sleep 30
          done

      # 2. Deploy Functions (Flex Consumption)
      #    Workaround: Flex Consumption + VNet = Kudu can't reach blob storage.
      #    Temporarily remove VNet integration, deploy, then re-add it.
      - name: Remove Function App VNet integration
        run: |
          az functionapp vnet-integration remove \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func || true
          echo "Waiting 60s for VNet removal to propagate..."
          sleep 60

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: sft-credigyfiles-dev-func
          package: artifacts/functions-package/functions-package.zip

      - name: Restore Function App VNet integration
        if: always()
        run: |
          VNET_ID="/subscriptions/$(az account show --query id -o tsv)/resourceGroups/rg-network-dev-eus/providers/Microsoft.Network/virtualNetworks/vnet-webapp-dev-eus"
          az functionapp vnet-integration add \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func \
            --vnet "$VNET_ID" \
            --subnet sn-credigyfiles-func-outbound-dev-172_23_17_208-28

      # 3. Deploy SPA to App Service
      - name: Zip SPA
        run: cd artifacts/web-dist && zip -r ../../web-package.zip .

      - name: Deploy SPA
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            az webapp deploy \
              --resource-group rg-credigyfiles-dev-eus \
              --name sft-credigyfiles-dev-spa \
              --src-path web-package.zip \
              --type zip \
              --clean true && break
            echo "Attempt $attempt failed, waiting 30s before retry..."
            sleep 30
          done

      # 4. Lock down public access
      - name: Disable public access
        if: always()
        run: |
          az webapp update \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api \
            --set publicNetworkAccess=Disabled
          az webapp update \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa \
            --set publicNetworkAccess=Disabled
          az storage account update \
            --name sftcredigyfilesdevfunc \
            --resource-group rg-credigyfiles-dev-eus \
            --default-action Deny \
            --public-network-access Disabled

      # 5. Re-sync Event Grid subscription
      - name: Update Event Grid subscription
        continue-on-error: true
        run: |
          FUNC_ID=$(az functionapp show \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-func \
            --query id --output tsv)

          az eventgrid system-topic event-subscription create \
            --resource-group rg-credigyfiles-dev-eus \
            --system-topic-name sft-credigyfiles-dev-evgt \
            --name sft-credigyfiles-dev-evgs-notify \
            --endpoint-type azurefunction \
            --endpoint "$FUNC_ID/functions/NotificationTrigger" \
            --included-event-types Microsoft.Storage.BlobCreated Microsoft.Storage.BlobDeleted \
            --max-delivery-attempts 30 \
            --event-ttl 1440
