name: CD — SPA

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
      - '.github/workflows/cd-spa.yml'
  workflow_dispatch:

concurrency:
  group: deploy-dev-spa
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-spa:
    name: Build & Deploy SPA
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AAD_CLIENT_ID: ${{ vars.VITE_AAD_CLIENT_ID }}
          VITE_AAD_TENANT_ID: ${{ vars.VITE_AAD_TENANT_ID }}
          VITE_AAD_API_CLIENT_ID: ${{ vars.VITE_AAD_API_CLIENT_ID }}

      - name: Zip package
        run: cd dist && zip -r $GITHUB_WORKSPACE/web-package.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Enable app storage public access
        working-directory: .
        run: |
          az storage account update \
            --name sftcredigyfilesdevapp \
            --resource-group rg-credigyfiles-dev-eus \
            --public-network-access Enabled \
            --default-action Allow

      - name: Upload package to blob storage
        working-directory: .
        run: |
          az storage blob upload \
            --account-name sftcredigyfilesdevapp \
            --container-name deploy-spa \
            --name package.zip \
            --file $GITHUB_WORKSPACE/web-package.zip \
            --overwrite \
            --auth-mode login

      - name: Disable app storage public access
        if: always()
        working-directory: .
        run: |
          az storage account update \
            --name sftcredigyfilesdevapp \
            --resource-group rg-credigyfiles-dev-eus \
            --default-action Deny \
            --public-network-access Disabled

      - name: Restart App Service
        working-directory: .
        run: |
          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa
