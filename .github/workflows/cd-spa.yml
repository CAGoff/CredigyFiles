name: CD — SPA

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
      - '.github/workflows/cd-spa.yml'
  workflow_dispatch:

concurrency:
  group: deploy-dev-spa
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-spa:
    name: Build & Deploy SPA
    runs-on: ubuntu-latest
    environment: dev
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      IMAGE_NAME: sft-spa
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          docker build \
            -f src/web/Dockerfile \
            --build-arg VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }} \
            --build-arg VITE_AAD_CLIENT_ID=${{ vars.VITE_AAD_CLIENT_ID }} \
            --build-arg VITE_AAD_TENANT_ID=${{ vars.VITE_AAD_TENANT_ID }} \
            --build-arg VITE_AAD_API_CLIENT_ID=${{ vars.VITE_AAD_API_CLIENT_ID }} \
            -t "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${ACR_SERVER}/${IMAGE_NAME}:latest" \
            src/web

          docker push "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${ACR_SERVER}/${IMAGE_NAME}:latest"

      - name: Deploy to App Service
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          az webapp config container set \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa \
            --container-image-name "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-spa
