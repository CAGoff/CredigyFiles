name: CD — API

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
      - 'SecureFileTransfer.sln'
      - '.github/workflows/cd-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-dev-api
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    environment: dev
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      IMAGE_NAME: sft-api
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          docker build \
            -f src/api/Dockerfile \
            -t "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${ACR_SERVER}/${IMAGE_NAME}:latest" \
            .

          docker push "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${ACR_SERVER}/${IMAGE_NAME}:latest"

      - name: Deploy to App Service
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ACR_SERVER="${ACR_NAME}.azurecr.io"

          az webapp config container set \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api \
            --container-image-name "${ACR_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api
