name: CD — API

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
      - 'SecureFileTransfer.sln'
      - '.github/workflows/cd-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-dev-api
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: >
          dotnet publish src/api/SecureFileTransfer.Api/SecureFileTransfer.Api.csproj
          --configuration Release
          --output ./publish/api

      - name: Zip package
        run: cd publish/api && zip -r ../../api-package.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Upload package to blob storage
        run: |
          az storage blob upload \
            --account-name sftcredigyfilesdevapp \
            --container-name deploy-api \
            --name package.zip \
            --file api-package.zip \
            --overwrite \
            --auth-mode login

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group rg-credigyfiles-dev-eus \
            --name sft-credigyfiles-dev-api
